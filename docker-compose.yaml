services:
  theplan:
    image: cgr.dev/chainguard/nginx:latest
    container_name: theplan
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.http.services.theplan.loadbalancer.server.port=8080"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
